name: Release

on:
  push:
    branches:
      - dev      # Development builds → dev tag
      - main     # Release candidates → rc tag
    tags:
      - 'v*'     # Production releases → version + latest tags

permissions:
  contents: write
  packages: write

jobs:
  metadata:
    name: Generate Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      commit: ${{ steps.meta.outputs.commit }}
      build_date: ${{ steps.meta.outputs.build_date }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Extract version metadata
        id: meta
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          COMMIT=$(git rev-parse HEAD 2>/dev/null || echo "unknown")
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "commit=${COMMIT}" >> $GITHUB_OUTPUT
          echo "build_date=${BUILD_DATE}" >> $GITHUB_OUTPUT

          # Determine image tags based on ref type and branch
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            # Git tag (e.g., v1.0.0) → version tag + latest
            # Example: v1.0.0 → tags: 1.0.0, latest
            VERSION_TAG=$(echo $GITHUB_REF | sed 's|refs/tags/v||')
            TAGS="ghcr.io/pokt-network/pocket-relay-miner:${VERSION_TAG},ghcr.io/pokt-network/pocket-relay-miner:latest"
            echo "🚀 Production Release: ${VERSION_TAG}"
          elif [[ $GITHUB_REF == refs/heads/main ]]; then
            # Main branch → version + rc tag
            # Example: main → tags: bd0f982, rc
            TAGS="ghcr.io/pokt-network/pocket-relay-miner:${VERSION},ghcr.io/pokt-network/pocket-relay-miner:rc"
            echo "📦 Release Candidate: ${VERSION}"
          elif [[ $GITHUB_REF == refs/heads/dev ]]; then
            # Dev branch → dev tag only (always latest dev)
            # Example: dev → tag: dev
            TAGS="ghcr.io/pokt-network/pocket-relay-miner:dev"
            echo "🔧 Development Build: ${VERSION}"
          else
            # Fallback for other branches
            BRANCH_NAME=$(echo $GITHUB_REF | sed 's|refs/heads/||')
            TAGS="ghcr.io/pokt-network/pocket-relay-miner:${BRANCH_NAME}-${VERSION}"
            echo "🌿 Branch Build: ${BRANCH_NAME}-${VERSION}"
          fi

          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

  build-amd64:
    name: Build AMD64
    runs-on: ubuntu-latest
    needs: metadata
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push AMD64 image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ghcr.io/pokt-network/pocket-relay-miner:${{ needs.metadata.outputs.version }}-amd64
          build-args: |
            VERSION=${{ needs.metadata.outputs.version }}
            COMMIT=${{ needs.metadata.outputs.commit }}
            BUILD_DATE=${{ needs.metadata.outputs.build_date }}
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64
          labels: |
            org.opencontainers.image.title=pocket-relay-miner
            org.opencontainers.image.description=High-Availability RelayMiner for Pocket Network Shannon
            org.opencontainers.image.url=https://github.com/pokt-network/pocket-relay-miner
            org.opencontainers.image.source=https://github.com/pokt-network/pocket-relay-miner
            org.opencontainers.image.version=${{ needs.metadata.outputs.version }}
            org.opencontainers.image.created=${{ needs.metadata.outputs.build_date }}
            org.opencontainers.image.revision=${{ needs.metadata.outputs.commit }}
            org.opencontainers.image.licenses=MIT

  build-arm64:
    name: Build ARM64
    runs-on: ubuntu-24.04-arm
    needs: metadata
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ghcr.io/pokt-network/pocket-relay-miner:${{ needs.metadata.outputs.version }}-arm64
          build-args: |
            VERSION=${{ needs.metadata.outputs.version }}
            COMMIT=${{ needs.metadata.outputs.commit }}
            BUILD_DATE=${{ needs.metadata.outputs.build_date }}
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64
          labels: |
            org.opencontainers.image.title=pocket-relay-miner
            org.opencontainers.image.description=High-Availability RelayMiner for Pocket Network Shannon
            org.opencontainers.image.url=https://github.com/pokt-network/pocket-relay-miner
            org.opencontainers.image.source=https://github.com/pokt-network/pocket-relay-miner
            org.opencontainers.image.version=${{ needs.metadata.outputs.version }}
            org.opencontainers.image.created=${{ needs.metadata.outputs.build_date }}
            org.opencontainers.image.revision=${{ needs.metadata.outputs.commit }}
            org.opencontainers.image.licenses=MIT

  create-manifest:
    name: Create Multi-Arch Manifest
    runs-on: ubuntu-latest
    needs: [metadata, build-amd64, build-arm64]
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          # Parse tags (comma-separated)
          IFS=',' read -ra TAG_ARRAY <<< "${{ needs.metadata.outputs.tags }}"

          # Create manifest for each tag
          for TAG in "${TAG_ARRAY[@]}"; do
            echo "Creating manifest for: $TAG"
            docker buildx imagetools create -t "$TAG" \
              ghcr.io/pokt-network/pocket-relay-miner:${{ needs.metadata.outputs.version }}-amd64 \
              ghcr.io/pokt-network/pocket-relay-miner:${{ needs.metadata.outputs.version }}-arm64
          done

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [metadata, create-manifest]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag for changelog range
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          CURRENT_TAG="${GITHUB_REF#refs/tags/}"

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "First release - generating full changelog"
            RANGE=""
          else
            echo "Generating changelog from ${PREVIOUS_TAG} to ${CURRENT_TAG}"
            RANGE="${PREVIOUS_TAG}..${CURRENT_TAG}"
          fi

          # Generate changelog content
          VERSION_NUMBER="${CURRENT_TAG#v}"
          cat > RELEASE_NOTES.md << EOF
          ## Docker Images

          **Multi-arch images available:**
          \`\`\`bash
          docker pull ghcr.io/pokt-network/pocket-relay-miner:${VERSION_NUMBER}
          docker pull ghcr.io/pokt-network/pocket-relay-miner:latest
          \`\`\`

          **Architecture-specific:**
          - AMD64: \`ghcr.io/pokt-network/pocket-relay-miner:${VERSION_NUMBER}-amd64\`
          - ARM64: \`ghcr.io/pokt-network/pocket-relay-miner:${VERSION_NUMBER}-arm64\`

          ## What's Changed

          EOF

          # Group commits by conventional commit type
          echo "### 🚀 Features" >> RELEASE_NOTES.md
          git log $RANGE --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" --grep="^feat" >> RELEASE_NOTES.md || echo "_No new features_" >> RELEASE_NOTES.md
          echo -e "\n" >> RELEASE_NOTES.md

          echo "### 🐛 Bug Fixes" >> RELEASE_NOTES.md
          git log $RANGE --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" --grep="^fix" >> RELEASE_NOTES.md || echo "_No bug fixes_" >> RELEASE_NOTES.md
          echo -e "\n" >> RELEASE_NOTES.md

          echo "### ⚡ Performance Improvements" >> RELEASE_NOTES.md
          git log $RANGE --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" --grep="^perf" >> RELEASE_NOTES.md || echo "_No performance improvements_" >> RELEASE_NOTES.md
          echo -e "\n" >> RELEASE_NOTES.md

          echo "### 🔧 Configuration & Build" >> RELEASE_NOTES.md
          git log $RANGE --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" --grep="^build\|^ci\|^chore" >> RELEASE_NOTES.md || echo "_No configuration changes_" >> RELEASE_NOTES.md
          echo -e "\n" >> RELEASE_NOTES.md

          echo "### 📚 Documentation" >> RELEASE_NOTES.md
          git log $RANGE --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" --grep="^docs" >> RELEASE_NOTES.md || echo "_No documentation changes_" >> RELEASE_NOTES.md
          echo -e "\n" >> RELEASE_NOTES.md

          # Add version info footer
          cat >> RELEASE_NOTES.md << EOF
          ---

          **Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${CURRENT_TAG}

          **Build Info:**
          - Version: ${CURRENT_TAG}
          - Commit: ${{ needs.metadata.outputs.commit }}
          - Build Date: ${{ needs.metadata.outputs.build_date }}
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
